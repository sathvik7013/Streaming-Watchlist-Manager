spring.application.name=streaming-watchlist-manager

# H2 Database
spring.datasource.url=jdbc:h2:mem:watchlistdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Initialize data after JPA schema creation
spring.sql.init.mode=always

# JWT Configuration
jwt.secret=StreamingWatchlistManagerSecretKeyForJWTTokenSigning2024!
jwt.expiration=86400000

# Server
server.port=${PORT:8080}
